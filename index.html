<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lena Bella 💕</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(#0a0a0a,#1a1a1a);
  color:white;
}

header {
  background:linear-gradient(90deg,#ff4d88,#ff99cc);
  padding:20px;
  text-align:center;
}

h1 {margin:0; font-size:40px;}

.hero {
  height:400px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle,#ff4d88,#000);
}

.section {padding:40px;}

h2 {color:#ff66a3;}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.box {
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

.box img {
  width:100%;
  height:240px;
  object-fit:cover;
}

/* LOCK */
.locked img {filter:blur(10px);}

.overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.btn {
  padding:10px 20px;
  background:hotpink;
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* PRICING */
.pricing {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:20px;
  width:240px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px hotpink;
}

.price {
  font-size:28px;
  color:hotpink;
}

/* POPUP */
.popup {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:10px 15px;
  border-radius:10px;
  font-size:14px;
  display:none;
}
</style>
</head>

<body>

</div>

<div class="box locked">

<button class="btn">Unlock €20</button>
</a>
</div>
</div>

</div>

</div>

<div class="section">

<div class="pricing">

<div class="card">
<h3>Basic</h3>
<div class="price">€20</div>
<a href="https://paypal.me/lenaBellaxX/20"><button class="btn">Buy</button></a>
</div>

<div class="card">
<h3>Premium</h3>

</div>

<div class="card">

<a href="https://paypal.me/lenaBellaxX/100"><button class="btn">Buy</button></a>

<!-- POPUP -->
<div class="popup" id="popup"></div>

<script>
const names = ["Mike","Alex","Jordan","Chris","Sam","Leo"];
function showPopup(){

}

setInterval(showPopup,5000);

</body>
</html>
